<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06d4c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square frame (list icon) -->
  <rect x="30" y="30" width="100" height="120" rx="12" fill="none" stroke="url(#frameGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- List lines inside frame -->
  <line x1="50" y1="55" x2="90" y2="55" stroke="url(#frameGrad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="75" x2="90" y2="75" stroke="url(#frameGrad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="95" x2="90" y2="95" stroke="url(#frameGrad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Bottom frame baseline -->
  <path d="M 30 135 Q 30 145 40 145 L 130 145 Q 140 145 140 135" fill="none" stroke="url(#frameGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bar chart inside frame -->
  <g opacity="0.8">
    <rect x="110" y="105" width="8" height="25" rx="4" fill="url(#trendGrad)"/>
    <rect x="120" y="95" width="8" height="35" rx="4" fill="url(#trendGrad)"/>
  </g>

  <!-- Trend line (upward arrow) -->
  <g opacity="0.95">
    <!-- Main trend line -->
    <path d="M 85 115 L 105 85 L 120 100 L 145 65"
          fill="none" stroke="url(#trendGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrow head -->
    <path d="M 145 65 L 135 70 M 145 65 L 142 52"
          fill="none" stroke="url(#trendGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Accent sun circle -->
  <circle cx="155" cy="50" r="10" fill="url(#trendGrad)" opacity="0.85"/>
</svg>
