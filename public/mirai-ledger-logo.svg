<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f8bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d4c1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="90" cy="90" r="85" fill="url(#bgGradient)" opacity="0.95"/>

  <!-- Subtle inner circle -->
  <circle cx="90" cy="90" r="82" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Wallet/Ledger icon -->
  <g transform="translate(90, 90)">
    <!-- Outer wallet shape -->
    <rect x="-35" y="-22" width="70" height="44" rx="6" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Inner compartment line -->
    <line x1="-35" y1="-8" x2="35" y2="-8" stroke="white" stroke-width="2"/>

    <!-- Coin circle (representing wealth/savings) -->
    <circle cx="0" cy="8" r="12" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Coin interior accent -->
    <path d="M -8 8 Q 0 0 8 8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>

    <!-- Chart bars (representing growth) -->
    <rect x="-15" y="18" width="3" height="8" fill="white" rx="1.5"/>
    <rect x="-6" y="14" width="3" height="12" fill="white" rx="1.5"/>
    <rect x="3" y="16" width="3" height="10" fill="white" rx="1.5"/>
    <rect x="12" y="12" width="3" height="14" fill="white" rx="1.5"/>
  </g>
</svg>
