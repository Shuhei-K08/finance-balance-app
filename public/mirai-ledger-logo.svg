<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f8bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d4c1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Main icon group -->
  <g transform="translate(100, 100)">
    <!-- Subtle background circle -->
    <circle cx="0" cy="0" r="70" fill="rgba(255,255,255,0.08)"/>

    <!-- Ascending line chart -->
    <g opacity="0.95">
      <!-- Point 1 -->
      <circle cx="-48" cy="28" r="3.5" fill="white"/>
      <!-- Point 2 -->
      <circle cx="-24" cy="8" r="3.5" fill="white"/>
      <!-- Point 3 -->
      <circle cx="0" cy="-12" r="3.5" fill="white"/>
      <!-- Point 4 -->
      <circle cx="24" cy="-28" r="3.5" fill="white"/>

      <!-- Connecting line -->
      <path d="M -48 28 L -24 8 L 0 -12 L 24 -28"
            stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Bottom baseline -->
    <line x1="-54" y1="40" x2="54" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Growth indicator accent -->
    <path d="M 28 -32 L 36 -40 L 40 -32"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
</svg>
